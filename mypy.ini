[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_unreachable = True
show_error_codes = True
pretty = True
strict_optional = False
allow_untyped_defs = True
allow_untyped_calls = True
no_implicit_optional = True

# Игнорируем «шум» сторонних либ, которые плохо аннотированы
[mypy-sqlalchemy.*]
ignore_errors = True

[mypy-alembic.*]
ignore_errors = True

[mypy-fastapi.*]
ignore_errors = True

[mypy-starlette.*]
ignore_errors = True

# Пока игнорируем GraphQL-модуль, чтобы не тормозить внедрение CRUD/аудита
[mypy-app.graphql.*]
ignore_errors = True

[mypy-configs.*]
ignore_errors = True
