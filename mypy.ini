# ==========================
# mypy.ini — упрощённая и безопасная конфигурация
# ==========================

[mypy]
python_version = 3.11
ignore_missing_imports = True
follow_imports = silent
allow_redefinition = True
pretty = True
incremental = True

# 🔹 Игнорируем наиболее частые "ложные" ошибки для FastAPI/Pydantic/SQLAlchemy
disable_error_code = arg-type, attr-defined, call-arg, misc, var-annotated, name-defined, no-redef, union-attr, assignment, type-arg

# 🔹 Ослабляем строгие проверки
warn_unused_ignores = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
no_implicit_optional = True
warn_return_any = False
warn_unreachable = False
strict_equality = False
show_error_codes = True


# 🔹 Разрешаем неполные аннотации
allow_untyped_globals = True
allow_subclassing_any = True
allow_untyped_calls = True

# Плагины (если установлен pydantic)
plugins = pydantic.mypy

# -------------------------------
# Игнорируем сложные или динамические модули проекта
# -------------------------------

[mypy-configs.*]
ignore_errors = True

[mypy-alembic.*]
ignore_errors = True

[mypy-app.graphql.*]
ignore_errors = True

[mypy-app.bootstrap]
ignore_errors = True

[mypy-app.admin_panel]
ignore_errors = True

[mypy-passlib.*]
ignore_missing_imports = True

[mypy-jose.*]
ignore_missing_imports = True

[mypy-strawberry.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-sqlmodel.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-itsdangerous.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-pydantic_settings.*]
ignore_missing_imports = True



[mypy-sqlalchemy.*]
ignore_errors = True
[mypy-alembic.*]
ignore_errors = True
[mypy-fastapi.*]
ignore_errors = True
[mypy-starlette.*]
ignore_errors = True

